name: PR Radar

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
      mode:
        description: 'Analysis mode'
        required: false
        default: 'regex'
        type: choice
        options:
          - regex
          - all
          - ai
      post_comments:
        description: 'Post comments to PR'
        required: false
        default: true
        type: boolean

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    runs-on: macos-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download ai-dev-tools-kit
        env:
          VERSION: v0.1.0
        run: |
          curl -fsSL "https://github.com/gestrich/AIDevTools/releases/download/${VERSION}/ai-dev-tools-kit-linux-x86_64.tar.gz" -o ai-dev-tools-kit.tar.gz
          curl -fsSL "https://github.com/gestrich/AIDevTools/releases/download/${VERSION}/checksums.txt" -o checksums.txt
          sha256sum --check --ignore-missing checksums.txt
          tar -xzf ai-dev-tools-kit.tar.gz
          chmod +x ai-dev-tools-kit
          sudo mv ai-dev-tools-kit /usr/local/bin/ai-dev-tools-kit

      - name: Create PRRadar config
        run: |
          ai-dev-tools-kit prradar config add ci \
            --repo-path ${{ github.workspace }} \
            --rules-dir ${{ github.workspace }}/code-review-rules \
            --github-account ci \
            --data-path /tmp/prradar-ci-data

      - name: Run review pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS="${{ github.event.inputs.pr_number }} \
            --config ci \
            --data-path /tmp/prradar-ci-data \
            --diff-source github-api \
            --mode ${{ github.event.inputs.mode }}"

          if [ "${{ github.event.inputs.post_comments }}" = "true" ]; then
            ARGS="$ARGS --no-dry-run"
          fi

          ai-dev-tools-kit prradar run $ARGS