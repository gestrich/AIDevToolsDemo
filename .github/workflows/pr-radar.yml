name: PR Radar

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
      mode:
        description: 'Analysis mode'
        required: false
        default: 'regex'
        type: choice
        options:
          - regex
          - all
          - ai
      post_comments:
        description: 'Post comments to PR'
        required: false
        default: true
        type: boolean

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    runs-on: macos-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout AIDevTools
        uses: actions/checkout@v4
        with:
          repository: gestrich/AIDevTools
          ref: ci/pr-radar-demo
          path: aidevtools
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Swift 6.2
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Mark workspace as safe directory
        run: git config --global --add safe.directory ${{ github.workspace }}

      - name: Build AIDevTools CLI
        run: |
          cd aidevtools/AIDevToolsKit
          swift build -c release --target AIDevToolsKitCLI

      - name: Create PRRadar config
        run: |
          cd aidevtools/AIDevToolsKit
          swift run -c release AIDevToolsKitCLI prradar config add ci \
            --repo-path ${{ github.workspace }} \
            --rules-dir ${{ github.workspace }}/code-review-rules \
            --github-account ci \
            --data-path /tmp/prradar-ci-data

      - name: Run review pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd aidevtools/AIDevToolsKit

          ARGS="${{ github.event.inputs.pr_number }} \
            --config ci \
            --data-path /tmp/prradar-ci-data \
            --diff-source github-api \
            --mode ${{ github.event.inputs.mode }}"

          if [ "${{ github.event.inputs.post_comments }}" = "true" ]; then
            ARGS="$ARGS --no-dry-run"
          fi

          swift run -c release AIDevToolsKitCLI prradar run $ARGS
